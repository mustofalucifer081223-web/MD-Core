    <script>
        // --- MULTI-LANGUAGE SYSTEM (i18n) ---
        const i18n = {
            en: { recom: "Recommended", games: "Games", apps: "Apps", search: "Search...", showMore: "Show More", home: "Home", settings: "Settings", colorTheme: "Color Theme", batterySaver: "Battery Saver (No Blur)", viewMode: "View Mode", fontStyle: "Font Style", list: "List", grid: "Grid", reset: "Reset", close: "Close", noGames: "No games found in this repository.", noApps: "No apps found in this repository.", getBtn: "GET", getNow: "Get Now" },
            id: { recom: "Rekomendasi", games: "Game", apps: "Aplikasi", search: "Cari...", showMore: "Tampilkan", home: "Beranda", settings: "Pengaturan", colorTheme: "Tema Warna", batterySaver: "Hemat Baterai", viewMode: "Tampilan", fontStyle: "Gaya Huruf", list: "Daftar", grid: "Kotak", reset: "Atur Ulang", close: "Tutup", noGames: "Tidak ada game ditemukan.", noApps: "Tidak ada aplikasi ditemukan.", getBtn: "UNDUH", getNow: "Dapatkan" },
            es: { recom: "Recomendado", games: "Juegos", apps: "Aplicaciones", search: "Buscar...", showMore: "Mostrar Más", home: "Inicio", settings: "Ajustes", colorTheme: "Tema de Color", batterySaver: "Ahorro de Batería", viewMode: "Modo de Vista", fontStyle: "Estilo de Fuente", list: "Lista", grid: "Cuadrícula", reset: "Reiniciar", close: "Cerrar", noGames: "No se encontraron juegos.", noApps: "No se encontraron aplicaciones.", getBtn: "OBTENER", getNow: "Consíguelo" },
            pt: { recom: "Recomendado", games: "Jogos", apps: "Aplicativos", search: "Pesquisar...", showMore: "Mostrar Mais", home: "Início", settings: "Configurações", colorTheme: "Tema de Cor", batterySaver: "Economia de Bateria", viewMode: "Modo de Exibição", fontStyle: "Estilo de Fonte", list: "Lista", grid: "Grade", reset: "Redefinir", close: "Fechar", noGames: "Nenhum jogo encontrado.", noApps: "Nenhum aplicativo encontrado.", getBtn: "OBTER", getNow: "Obter Agora" },
            ru: { recom: "Рекомендуемые", games: "Игры", apps: "Приложения", search: "Поиск...", showMore: "Показать еще", home: "Главная", settings: "Настройки", colorTheme: "Цветовая тема", batterySaver: "Экономия батареи", viewMode: "Режим просмотра", fontStyle: "Стиль шрифта", list: "Список", grid: "Сетка", reset: "Сброс", close: "Закрыть", noGames: "Игры не найдены.", noApps: "Приложения не найдены.", getBtn: "СКАЧАТЬ", getNow: "Получить" },
            hi: { recom: "अनुशंसित", games: "खेल", apps: "ऐप्स", search: "खोजें...", showMore: "और दिखाएं", home: "होम", settings: "सेटिंग्स", colorTheme: "रंग विषय", batterySaver: "बैटरी सेवर", viewMode: "दृश्य मोड", fontStyle: "फ़ॉन्ट शैली", list: "सूची", grid: "ग्रिड", reset: "रीसेट", close: "बंद करें", noGames: "कोई खेल नहीं मिला।", noApps: "कोई ऐप नहीं मिला।", getBtn: "प्राप्त करें", getNow: "अभी प्राप्त करें" }
        };

        let userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();
        if (!i18n[userLang]) userLang = 'en'; 

        function t(key) { return i18n[userLang][key]; }

        function applyLanguage() {
            document.getElementById('t-recom').innerHTML = `<i class="fa-solid fa-wand-magic-sparkles recom-icon"></i> ${t('recom')}`;
            document.getElementById('t-games').innerHTML = `<i class="fa-solid fa-gamepad games-icon"></i> ${t('games')}`;
            document.getElementById('t-apps').innerHTML = `<i class="fa-solid fa-grip apps-icon"></i> ${t('apps')}`;
            document.getElementById('search').placeholder = t('search');
            document.getElementById('t-showMoreGames').innerText = t('showMore');
            document.getElementById('t-showMoreApps').innerText = t('showMore');
            document.getElementById('t-navHome').innerText = t('home');
            document.getElementById('t-navGames').innerText = t('games');
            document.getElementById('t-navApps').innerText = t('apps');
            document.getElementById('t-navSettings').innerText = t('settings');
            document.getElementById('t-settingsTitle').innerText = t('settings');
            document.getElementById('t-colorTheme').innerText = t('colorTheme');
            document.getElementById('t-batterySaver').innerText = t('batterySaver');
            document.getElementById('t-viewMode').innerText = t('viewMode');
            document.getElementById('t-fontStyle').innerText = t('fontStyle');
            document.getElementById('t-list').innerText = t('list');
            document.getElementById('t-grid').innerText = t('grid');
            document.getElementById('t-btnReset').innerText = t('reset');
            document.getElementById('t-btnClose').innerText = t('close');
        }

        const GITHUB_CONFIG = {
            owner: 'mustofalucifer081223-web',   
            repo: 'MD-Core',    
            branch: 'main'       
        };

        function showToast(msg, type) {
            const toastEl = document.getElementById('network-toast');
            let iconColor = type === 'offline' ? 'var(--accent)' : '#10b981';
            let iconClass = type === 'offline' ? 'fa-solid fa-wifi-slash' : 'fa-solid fa-wifi';
            
            toastEl.innerHTML = `<i class="${iconClass}" style="color:${iconColor}"></i> ${msg}`;
            toastEl.className = `toast show ${type}`;
            setTimeout(() => toastEl.classList.remove('show'), 3500);
        }

        window.addEventListener('offline', () => showToast(userLang==='id'?'Koneksi internet terputus!':'Internet connection lost!', 'offline'));
        window.addEventListener('online', () => showToast(userLang==='id'?'Kembali online!':'Back online!', 'online'));

        function createBgIcons() {
            const bgContainer = document.getElementById('bg-animation');
            const icons = ['fa-brands fa-android', 'fa-solid fa-gamepad', 'fa-solid fa-user-secret', 'fa-solid fa-wand-magic-sparkles', 'fa-solid fa-bug'];
            
            for(let i = 0; i < 15; i++) {
                let el = document.createElement('i');
                let randomIcon = icons[Math.floor(Math.random() * icons.length)];
                el.className = `bg-icon ${randomIcon}`;
                el.style.left = `${Math.random() * 100}vw`;
                el.style.animationDuration = `${10 + Math.random() * 25}s`;
                el.style.animationDelay = `-${Math.random() * 20}s`;
                el.style.fontSize = `${1.5 + Math.random() * 2}rem`;
                bgContainer.appendChild(el);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyLanguage();
            createBgIcons();
            setTimeout(() => { document.body.classList.add('app-ready'); }, 50);
            if(!navigator.onLine) {
                setTimeout(() => showToast(userLang==='id'?'Anda sedang offline!':'You are offline!', 'offline'), 1000);
            }
        });

        document.getElementById('year').innerText = new Date().getFullYear();

        let dbApps = [];
        let dbGames = [];
        let showAppsCount = 10;
        let showGamesCount = 10;
        let isDataLoaded = false;

        function getBaseName(name) {
            let n = name.toLowerCase();
            n = n.replace(/v\d+(\.\d+)*/g, '');
            n = n.replace(/\(.*\)/g, ''); 
            n = n.replace(/\[.*\]/g, ''); 
            n = n.replace(/mod|apk|premium|pro|unlocked|full/g, '');
            n = n.replace(/[\.\-\_]/g, ' '); 
            return n.trim();
        }

        async function scanDirectory(folderPath, type) {
            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${folderPath}?ref=${GITHUB_CONFIG.branch}`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    if(response.status === 404) return []; 
                    if(response.status === 403) console.warn("GitHub API Rate Limit Exceeded!");
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                
                const data = await response.json();
                let items = [];

                data.forEach((item, index) => {
                    if (item.type === 'dir') {
                        const rawName = item.name;
                        const pageLink = `/${folderPath}/${rawName}/`; 
                        const imgUrl = `https://cdn.jsdelivr.net/gh/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}@${GITHUB_CONFIG.branch}/${folderPath}/${rawName}/MODORA-Images.jpg`;
                        
                        items.push({
                            name: rawName.replace(/[-_]/g, ' '),
                            baseName: getBaseName(rawName), 
                            link: pageLink, 
                            img: imgUrl,
                            type: type,
                            time: Date.now() - (index * 1000) 
                        });
                    }
                });
                return items;
            } catch (error) {
                console.error(`Failed to scan ${folderPath}:`, error);
                return []; 
            }
        }

        function filterLatest(items) {
            let map = {};
            items.forEach(item => {
                const key = item.baseName; 
                if (!map[key]) {
                    map[key] = item;
                } else {
                    if (item.time > map[key].time) {
                        map[key] = item;
                    }
                }
            });
            return Object.values(map).sort((a, b) => b.time - a.time);
        }

        async function initData() {
            const [appsRaw, gamesRaw] = await Promise.all([
                scanDirectory('apps', 'app'),
                scanDirectory('games', 'game')
            ]);
            
            dbApps = filterLatest(appsRaw); 
            dbGames = filterLatest(gamesRaw);
            isDataLoaded = true;
            
            renderRecom();
            renderLists();
            updateNavBadges();
        }

        function updateNavBadges() {
            const badgeApp = document.getElementById('badge-app');
            const badgeGame = document.getElementById('badge-game');

            if (dbApps.length > 0) { badgeApp.innerText = dbApps.length; badgeApp.style.display = 'block'; }
            if (dbGames.length > 0) { badgeGame.innerText = dbGames.length; badgeGame.style.display = 'block'; }
        }

        let autoScrollInterval;
        let isUserInteracting = false;
        
        function initInfiniteScroll() {
            const wrap = document.querySelector('.recom-wrap');
            if(!wrap) return;

            function scrollStep() {
                if(!isUserInteracting && wrap.scrollWidth > wrap.clientWidth) {
                    wrap.scrollLeft += 1; 
                    if (wrap.scrollLeft >= wrap.scrollWidth / 2) {
                        wrap.scrollLeft -= (wrap.scrollWidth / 2);
                    }
                }
                autoScrollInterval = requestAnimationFrame(scrollStep);
            }

            wrap.addEventListener('mouseenter', () => isUserInteracting = true);
            wrap.addEventListener('mouseleave', () => isUserInteracting = false);
            wrap.addEventListener('touchstart', () => isUserInteracting = true, {passive: true});
            wrap.addEventListener('touchend', () => isUserInteracting = false);

            if(autoScrollInterval) cancelAnimationFrame(autoScrollInterval);
            autoScrollInterval = requestAnimationFrame(scrollStep);
        }

        function renderRecom() {
            const container = document.getElementById('recomContainer');
            if(!isDataLoaded) return; 
            
            const allReal = [...dbApps, ...dbGames];
            if(allReal.length === 0) {
                container.innerHTML = `<div class="status-msg">${t('noGames')}</div>`;
                return;
            }

            const shuffled = allReal.sort(() => 0.5 - Math.random()).slice(0, 15);
            let html = '';
            
            shuffled.forEach(item => {
                html += `
                <div class="trend-card" onclick="openLink('${item.link}')">
                    <span class="trend-badge">MOD</span>
                    <div class="trend-name">${item.name}</div>
                    <div class="trend-act">${t('getNow')} <i class="fa-solid fa-arrow-right"></i></div>
                    <img src="${item.img}" class="trend-bg" loading="lazy" onerror="this.style.opacity=0">
                </div>`;
            });
            
            container.innerHTML = html + html; 
            initInfiniteScroll();
        }

        function createCardHtml(item) {
            let iconHtml = `<img src="${item.img}" class="clean-icon" loading="lazy" onerror="this.src='https://via.placeholder.com/70?text=IMG'">`;

            return `
            <div class="clean-card" onclick="openLink('${item.link}')">
                <div class="icon-wrap">
                    ${iconHtml}
                    <div class="mod-label">MOD</div>
                </div>
                <div class="clean-info">
                    <div class="clean-name">${item.name}</div>
                </div>
                <button class="btn-unduh">${t('getBtn')}</button>
            </div>`;
        }

        function renderLists() {
            const cApps = document.getElementById('appsContainer');
            const cGames = document.getElementById('gamesContainer');
            
            if(!isDataLoaded) return; 

            // Render Games First
            if(dbGames.length === 0) {
                cGames.innerHTML = `<div class="status-msg">${t('noGames')}</div>`;
                document.getElementById('btnMoreGames').classList.add('hidden');
            } else {
                let hGames = ''; 
                dbGames.slice(0, showGamesCount).forEach(item => hGames += createCardHtml(item));
                cGames.innerHTML = hGames;
                document.getElementById('btnMoreGames').classList.toggle('hidden', showGamesCount >= dbGames.length);
            }

            // Render Apps Second
            if(dbApps.length === 0) {
                cApps.innerHTML = `<div class="status-msg">${t('noApps')}</div>`;
                document.getElementById('btnMoreApps').classList.add('hidden');
            } else {
                let hApps = ''; 
                dbApps.slice(0, showAppsCount).forEach(item => hApps += createCardHtml(item));
                cApps.innerHTML = hApps;
                document.getElementById('btnMoreApps').classList.toggle('hidden', showAppsCount >= dbApps.length);
            }
        }

        function loadMoreApps() { showAppsCount += 10; renderLists(); }
        function loadMoreGames() { showGamesCount += 10; renderLists(); }
        
        function openLink(url) { 
            if(url && url !== '#') window.location.href = url; 
            else alert('Link is broken or still processing!'); 
        }

        function doSearch() {
            const val = document.getElementById('search').value.toLowerCase();
            const secRecom = document.getElementById('section-recom');
            const secApps = document.getElementById('section-apps');
            const secGames = document.getElementById('section-games');

            if(val === '') {
                secRecom.style.display = 'block'; 
                secApps.style.display = 'block'; 
                secGames.style.display = 'block';
                showAppsCount=10; showGamesCount=10;
                renderLists();
                return;
            }
            
            secRecom.style.display = 'none'; 
            secApps.style.display = 'block'; 
            secGames.style.display = 'block';
            
            const fGames = dbGames.filter(i => i.name.toLowerCase().includes(val));
            let hGame = ''; 
            fGames.forEach(item => hGame += createCardHtml(item));
            document.getElementById('gamesContainer').innerHTML = hGame || `<div class="status-msg">${t('noGames')}</div>`;
            document.getElementById('btnMoreGames').classList.add('hidden');

            const fApps = dbApps.filter(i => i.name.toLowerCase().includes(val));
            let hApp = ''; 
            fApps.forEach(item => hApp += createCardHtml(item));
            document.getElementById('appsContainer').innerHTML = hApp || `<div class="status-msg">${t('noApps')}</div>`;
            document.getElementById('btnMoreApps').classList.add('hidden');
        }

        function toggleSet() { document.getElementById('modalSet').classList.toggle('active'); }

        function loadSettings() {
            if(localStorage.getItem('modora_eco') === 'true') {
                document.documentElement.classList.add('eco-mode');
                document.getElementById('ecoToggle').classList.add('active');
            }

            const savedColor = localStorage.getItem('modora_color');
            const savedSec = localStorage.getItem('modora_color_sec');
            if(savedColor) {
                document.documentElement.style.setProperty('--primary', savedColor);
                document.documentElement.style.setProperty('--secondary', savedSec);
                updateColorActive(savedColor);
            } else {
                updateColorActive('#2563eb');
            }

            applyViewModeClass(localStorage.getItem('modora_view') || 'list');
            
            const currFont = localStorage.getItem('modora_font') || 'Plus Jakarta Sans';
            document.querySelectorAll('.seg-btn[onclick*="chFont"]').forEach(b => b.classList.remove('active'));
            if(currFont.includes('Jakarta')) document.getElementById('btnFontModern').classList.add('active');
            else if(currFont.includes('Merriweather')) document.getElementById('btnFontClassic').classList.add('active');
            else document.getElementById('btnFontTech').classList.add('active');
        }

        function toggleEco() {
            const isEco = document.documentElement.classList.toggle('eco-mode');
            document.getElementById('ecoToggle').classList.toggle('active');
            localStorage.setItem('modora_eco', isEco ? 'true' : 'false');
        }

        function setThemeColor(prim, sec, el) {
            document.documentElement.style.setProperty('--primary', prim);
            document.documentElement.style.setProperty('--secondary', sec);
            localStorage.setItem('modora_color', prim);
            localStorage.setItem('modora_color_sec', sec);
            updateColorActive(prim);
        }

        function updateColorActive(color) {
            document.querySelectorAll('.color-item').forEach(c => {
                c.classList.remove('active');
                if(c.getAttribute('data-color') === color) c.classList.add('active');
            });
        }

        function setViewMode(mode) {
            if (!document.startViewTransition) { applyViewModeClass(mode); return; }
            document.startViewTransition(() => { applyViewModeClass(mode); });
        }

        function applyViewModeClass(mode) {
            const cApps = document.getElementById('appsContainer');
            const cGames = document.getElementById('gamesContainer');

            cApps.className = `list-container view-${mode}`;
            cGames.className = `list-container view-${mode}`;

            document.getElementById('btnViewList').classList.toggle('active', mode === 'list');
            document.getElementById('btnViewGrid').classList.toggle('active', mode === 'grid');
            localStorage.setItem('modora_view', mode);
        }

        function chFont(fontName) {
            document.documentElement.style.setProperty('--font-main', fontName);
            localStorage.setItem('modora_font', fontName);
            document.querySelectorAll('.seg-btn[onclick*="chFont"]').forEach(b => b.classList.remove('active'));
            if(fontName.includes('Jakarta')) document.getElementById('btnFontModern').classList.add('active');
            else if(fontName.includes('Merriweather')) document.getElementById('btnFontClassic').classList.add('active');
            else document.getElementById('btnFontTech').classList.add('active');
        }

        function resetSettings() {
            localStorage.clear();
            window.location.reload();
        }

        const rocketWrap = document.getElementById('rocket');
        const rocketBtn = document.getElementById('rocketBtn');
        let isLaunching = false;

        window.onscroll = () => { if(!isLaunching) window.scrollY > 200 ? rocketWrap.classList.add('show') : rocketWrap.classList.remove('show'); }

        function launchSequence() {
            if(isLaunching) return; isLaunching = true;
            rocketBtn.classList.add('vibrating');
            setTimeout(() => {
                rocketBtn.classList.remove('vibrating'); rocketBtn.classList.add('launching');
                for(let i=0; i<20; i++) {
                    const s = document.createElement('div'); s.classList.add('smoke-particle');
                    s.style.setProperty('--tx', `${(Math.random()-0.5)*60}px`); s.style.animationDelay = `${Math.random()*0.2}s`;
                    rocketBtn.appendChild(s); setTimeout(() => s.remove(), 1000);
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
                setTimeout(() => { rocketBtn.classList.remove('launching'); rocketWrap.classList.remove('show'); isLaunching = false; }, 1500);
            }, 300);
        }

        loadSettings(); 
        initData();
    </script>
</body>
</html>
